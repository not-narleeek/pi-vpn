name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Type-check (tsc — extension + TUI)
        run: npm run check
      - name: Build TUI bundle (esbuild)
        run: npm run build
      - name: Verify the binary runs
        run: node dist/pi-vpn.cjs --help
